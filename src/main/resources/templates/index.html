<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-theme="night">
<head>
    <meta charset="UTF-8">
    <title>ML Tier List</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.2/dist/full.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="p-10">

<div class="flex justify-between items-center mb-8">
    <h1 class="text-3xl font-bold">ML Hero Tier List</h1>
    <!-- Tombol Buka Modal -->
    <button class="btn btn-primary" onclick="modal_tambah.showModal()">+ Tambah Hero</button>
</div>

<!-- Grid Kartu Hero -->
<div class="grid grid-cols-1 md:grid-cols-4 gap-6">
    <div th:each="h : ${listHero}" class="card bg-base-200 shadow-xl border border-slate-700">
        <div class="card-body">
            <h2 class="card-title text-blue-400" th:text="${h.namaHero}">Nama</h2>
            <div class="badge badge-secondary" th:text="${h.role}">Role</div>
            <p class="text-xs mt-2">Counter: <span th:text="${h.counter}">-</span></p>
            <div class="card-actions justify-end mt-4">
                <a th:href="@{'/hero/delete/' + ${h.idHero}}" class="btn btn-error btn-xs">Hapus</a>
            </div>
        </div>
    </div>
</div>

<!-- Modal Form (DaisyUI) -->
<dialog id="modal_tambah" class="modal">
    <div class="modal-box bg-base-300">
        <h3 class="font-bold text-lg mb-4">Form Input Hero</h3>
        <form th:action="@{/hero/save}" method="POST" class="space-y-4">
            <input type="text" name="namaHero" placeholder="Nama Hero" class="input input-bordered w-full" required />
            <select name="role" class="select select-bordered w-full">
                <option>Assassin</option><option>Tank</option><option>Fighter</option><option>Mage</option>
            </select>
            <div class="modal-action">
                <button type="submit" class="btn btn-success">Simpan</button>
                <button type="button" class="btn" onclick="modal_tambah.close()">Batal</button>
            </div>
        </form>
    </div>
</dialog>

<!-- Script SweetAlert2 (Telinga Notifikasi) -->
<script th:if="${pesan}">
    Swal.fire({
        title: 'Notifikasi',
        text: "[[${pesan}]]",
        icon: "[[${tipe}]]",
        background: '#1d232a',
        color: '#a6adbb'
    });
</script>

</body>
</html>

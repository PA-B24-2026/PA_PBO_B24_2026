<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-theme="night">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Tier List Hero Mobile Legends: Bang Bang</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.2/dist/full.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Efek visual saat item hero sedang di-drag */
        .dragging {
            opacity: 0.5;
            transform: scale(0.95);
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans antialiased">

<div class="max-w-7xl mx-auto px-4 py-8">

    <header class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-8 border-b border-slate-800 pb-6">
        <div>
            <h1 class="text-2xl font-extrabold tracking-tight bg-gradient-to-r from-yellow-400 to-amber-500 bg-clip-text text-transparent">
                Sistem Tier List Hero Mobile Legends: Bang Bang
            </h1>
            <p class="text-sm text-slate-400 mt-1">Geser hero ke tier pilihan dan simpan hasilnya ke database.</p>
        </div>

        <div class="flex flex-wrap items-center gap-2 w-full sm:w-auto justify-end">
            <a th:href="@{/sync}" class="btn btn-outline btn-warning btn-sm gap-2 norm-case">
                <i class="fa-solid fa-rotate"></i> Sync API
            </a>
            <button class="btn btn-outline btn-accent btn-sm gap-2 norm-case" onclick="modal_load.showModal()">
                <i class="fa-solid fa-folder-open"></i> Buka Tierlist
            </button>
            <button class="btn btn-primary btn-sm gap-2 norm-case" onclick="modal_tambah.showModal()">
                <i class="fa-solid fa-plus"></i> Hero Baru
            </button>
        </div>
    </header>

    <section class="bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden mb-8">

        <!-- Tier S -->
        <div class="flex border-b border-slate-800 min-h-[90px]">
            <div class="w-24 bg-slate-800 flex items-center justify-center shrink-0 select-none border-r border-slate-800">
                <span class="text-3xl font-black bg-gradient-to-br from-yellow-400 to-amber-600 bg-clip-text text-transparent">S</span>
            </div>
            <div class="tier-row flex flex-wrap gap-2 p-2 items-center flex-grow bg-slate-900/40" data-tier="S" ondragover="allowDrop(event)" ondrop="drop(event)"></div>
        </div>

        <!-- Tier A -->
        <div class="flex border-b border-slate-800 min-h-[90px]">
            <div class="w-24 bg-slate-800 flex items-center justify-center shrink-0 select-none border-r border-slate-800">
                <span class="text-2xl font-black bg-gradient-to-br from-red-400 to-rose-600 bg-clip-text text-transparent">A</span>
            </div>
            <div class="tier-row flex flex-wrap gap-2 p-2 items-center flex-grow bg-slate-900/40" data-tier="A" ondragover="allowDrop(event)" ondrop="drop(event)"></div>
        </div>

        <!-- Tier B -->
        <div class="flex border-b border-slate-800 min-h-[90px]">
            <div class="w-24 bg-slate-800 flex items-center justify-center shrink-0 select-none border-r border-slate-800">
                <span class="text-2xl font-black bg-gradient-to-br from-orange-400 to-orange-600 bg-clip-text text-transparent">B</span>
            </div>
            <div class="tier-row flex flex-wrap gap-2 p-2 items-center flex-grow bg-slate-900/40" data-tier="B" ondragover="allowDrop(event)" ondrop="drop(event)"></div>
        </div>

        <!-- Tier C -->
        <div class="flex border-b border-slate-800 min-h-[90px]">
            <div class="w-24 bg-slate-800 flex items-center justify-center shrink-0 select-none border-r border-slate-800">
                <span class="text-2xl font-black bg-gradient-to-br from-emerald-400 to-green-600 bg-clip-text text-transparent">C</span>
            </div>
            <div class="tier-row flex flex-wrap gap-2 p-2 items-center flex-grow bg-slate-900/40" data-tier="C" ondragover="allowDrop(event)" ondrop="drop(event)"></div>
        </div>

        <!-- Tier D -->
        <div class="flex border-b border-slate-800 min-h-[90px]">
            <div class="w-24 bg-slate-800 flex items-center justify-center shrink-0 select-none border-r border-slate-800">
                <span class="text-2xl font-black bg-gradient-to-br from-sky-400 to-blue-600 bg-clip-text text-transparent">D</span>
            </div>
            <div class="tier-row flex flex-wrap gap-2 p-2 items-center flex-grow bg-slate-900/40" data-tier="D" ondragover="allowDrop(event)" ondrop="drop(event)"></div>
        </div>

        <!-- Tier F -->
        <div class="flex min-h-[90px]">
            <div class="w-24 bg-slate-800 flex items-center justify-center shrink-0 select-none border-r border-slate-800">
                <span class="text-2xl font-black bg-gradient-to-br from-slate-400 to-slate-600 bg-clip-text text-transparent">F</span>
            </div>
            <div class="tier-row flex flex-wrap gap-2 p-2 items-center flex-grow bg-slate-900/40" data-tier="F" ondragover="allowDrop(event)" ondrop="drop(event)"></div>
        </div>
    </section>

    <section class="bg-slate-900 p-5 border border-slate-800 rounded-xl mb-8 flex flex-col md:flex-row items-end gap-4 shadow-lg">
        <form id="formTierList" th:action="@{/tierlist/save}" method="POST" class="w-full flex flex-col md:flex-row items-end gap-4">

            <input type="hidden" id="susunanHeroInput" name="susunanHero" required>
            <input type="hidden" id="idTierInput" name="idTier">

            <div class="form-control w-full md:w-1/3">
                <label class="label py-1"><span class="label-text text-xs text-slate-400 font-bold">NAMA TIER LIST</span></label>
                <input type="text" name="namaTierList" placeholder="Contoh: Tier List M7 Tournament" class="input input-sm input-bordered bg-slate-950 border-slate-700 w-full" required />
            </div>

            <div class="form-control w-full md:w-1/4">
                <label class="label py-1"><span class="label-text text-xs text-slate-400 font-bold">JENIS TIER</span></label>
                <select name="jenisTier" class="select select-sm select-bordered bg-slate-950 border-slate-700 w-full">
                    <option value="serius">Competitive</option>
                    <option value="santai">Casual</option>
                </select>
            </div>

            <button type="button" onclick="prosesSimpanTierList()" class="btn btn-sm btn-success text-black font-bold norm-case w-full md:w-auto px-6">
                <i class="fa-solid fa-floppy-disk"></i> Simpan Tier List ke Database
            </button>
            <button type="button" onclick="resetCanvas()" class="btn btn-sm btn-outline btn-error norm-case px-4">
                <i class="fa-solid fa-rotate-left"></i> Reset Tier List
            </button>
        </form>
    </section>

    <section>
        <h2 class="text-lg font-bold text-slate-400 mb-4 flex items-center gap-2 select-none">
            <i class="fa-solid fa-list-ul text-amber-500"></i> Daftar Hero
        </h2>

        <div id="heroPoolZone" class="flex flex-wrap gap-3 p-4 bg-slate-900/60 border border-slate-800 border-dashed rounded-xl min-h-[150px]" ondragover="allowDrop(event)" ondrop="drop(event)">

            <div th:each="h : ${heroes}"
                 th:id="'hero-' + ${h.idHero}"
                 th:data-nama="${h.namaHero}"
                 draggable="true"
                 ondragstart="drag(event)"
                 ondragend="dragEnd(event)"
                 class="hero-item card w-20 bg-slate-800 border border-slate-700 rounded-lg overflow-hidden cursor-grab active:cursor-grabbing shadow-sm hover:border-slate-500 transition-all select-none group relative">

                <div class="w-full aspect-square bg-slate-950 flex items-center justify-center overflow-hidden pointer-events-none">
                    <img th:if="${h.gambar != null}" th:src="${h.gambar}" alt="Img" class="w-full h-full object-cover" />
                    <i th:if="${h.gambar == null}" class="fa-solid fa-user text-slate-600 text-lg"></i>
                </div>

                <div class="p-1 bg-slate-900 text-[9px] text-center font-medium truncate pointer-events-none" th:text="${h.namaHero}">Nama</div>

            </div>

        </div>
    </section>
</div>

<dialog id="modal_load" class="modal backdrop-blur-sm">
    <div class="modal-box bg-slate-900 border border-slate-800 p-6 rounded-xl max-w-2xl h-[500px] flex flex-col">
        <h3 class="font-bold text-lg mb-4 text-slate-200 flex items-center gap-2">
            <i class="fa-solid fa-folder-open text-yellow-500"></i> Pilih Daftar Tier List
        </h3>

        <div class="overflow-y-auto flex-grow space-y-3 pr-2">
            <div th:each="tier : ${tiers}" class="bg-slate-950 border border-slate-800 p-4 rounded-xl flex items-center justify-between gap-4 hover:border-slate-700 transition-all">
                <div class="flex-grow min-w-0">
                    <div class="flex items-center gap-2 mb-1.5">
                        <span th:text="${tier.class.simpleName == 'CompetitiveTierList' ? 'Competitive' : 'Casual'}"
                              th:class="${tier.class.simpleName == 'CompetitiveTierList' ? 'badge badge-error badge-xs font-black p-2 text-[9px] tracking-wider uppercase text-white' : 'badge badge-info badge-xs font-black p-2 text-[9px] tracking-wider uppercase text-white'}">
                            Jenis
                        </span>
                        <h4 class="font-bold text-sm text-slate-200 truncate"
                            th:text="${#strings.isEmpty(tier.namaTierList) ? 'TIERLIST TANPA NAMA' : tier.namaTierList}">
                            Nama
                        </h4>
                    </div>
                    <p class="text-xs text-slate-400 truncate font-medium json-clean-preview" th:data-raw="${tier.susunanHero}">
                        Memproses ringkasan susunan hero...
                    </p>
                </div>

                <button type="button"
                        class="btn btn-sm btn-warning font-extrabold text-xs shrink-0 text-black px-4"
                        th:data-id="${tier.idTier}"
                        th:data-nama="${tier.namaTierList}"
                        th:data-jenis="${tier.class.simpleName == 'CompetitiveTierList' ? 'serius' : 'santai'}"
                        th:data-susunan="${tier.susunanHero}"
                        onclick="bukaDanAturPapan(this)">
                    Muat
                </button>
                <button type="button"
                        class="btn btn-sm btn-error btn-square text-white"
                        th:onclick="'konfirmasiHapusTierList(\'' + @{'/tierlist/delete/' + ${tier.idTier}} + '\')'">
                    <i class="fa-solid fa-trash"></i>
                </button>
            </div>

            <div th:if="${#lists.isEmpty(tiers)}" class="text-center py-12 text-slate-500 text-sm">
                <i class="fa-solid fa-box-open text-3xl mb-2 block text-slate-700"></i>
                Belum ada data tier list tersimpan di database.
            </div>
        </div>

        <div class="modal-action border-t border-slate-800 pt-3 mt-3">
            <button type="button" class="btn btn-sm btn-ghost" onclick="modal_load.close()">Tutup</button>
        </div>
    </div>
</dialog>

<dialog id="modal_tambah" class="modal backdrop-blur-sm">
    <div class="modal-box bg-slate-900 border border-slate-800 p-6 rounded-xl max-w-md">
        <h3 class="font-bold text-lg mb-4 text-slate-200">Tambah Hero Manual</h3>
        <form th:action="@{/hero/save}" method="POST" class="space-y-4">
            <div class="form-control">
                <label class="label"><span class="label-text text-slate-400 text-sm">Nama Hero</span></label>
                <input type="text" name="namaHero" placeholder="Misal: Ling" class="input input-bordered bg-slate-950 border-slate-700 w-full" required />
            </div>

            <div class="form-control">
                <label class="label"><span class="label-text text-slate-400 text-sm">URL Gambar Avatar (Link Gambar)</span></label>
                <input type="url" name="gambar" placeholder="https://example.com/chou.png" class="input input-bordered bg-slate-950 border-slate-700 w-full" />
            </div>

            <div class="form-control">
                <label class="label"><span class="label-text text-slate-400 text-sm">Role (Pilih Multi)</span></label>
                <div class="grid grid-cols-2 gap-2 bg-slate-950 p-3 rounded-lg border border-slate-800">
                    <label th:each="r : ${#strings.arraySplit('Assassin,Marksman,Tank,Mage,Fighter,Support', ',')}" class="flex items-center gap-2 cursor-pointer p-1">
                        <input type="checkbox" name="roleList" th:value="${r}" class="checkbox checkbox-xs checkbox-warning rounded" />
                        <span class="label-text text-xs text-slate-300" th:text="${r}">Role</span>
                    </label>
                </div>
            </div>
            <div class="modal-action">
                <button type="button" class="btn btn-sm btn-ghost" onclick="modal_tambah.close()">Batal</button>
                <button type="submit" class="btn btn-sm btn-primary">Simpan</button>
            </div>
        </form>
    </div>
</dialog>

<script th:inline="javascript">

    // 1. FUNGSI DRAG & DROP UTAMA
    function allowDrop(ev) {
        ev.preventDefault();
    }

    function drag(ev) {
        ev.target.classList.add('dragging');
        ev.dataTransfer.setData("text", ev.target.id);
    }

    function dragEnd(ev) {
        ev.target.classList.remove('dragging');
    }

    function drop(ev) {
        ev.preventDefault();
        const dataId = ev.dataTransfer.getData("text");
        const draggedElement = document.getElementById(dataId);

        let targetZone = ev.target;
        while (!targetZone.classList.contains('tier-row') && targetZone.id !== 'heroPoolZone') {
            targetZone = targetZone.parentElement;
            if (!targetZone) return;
        }

        targetZone.appendChild(draggedElement);
    }

    // SERIALISASI DATA SEBELUM FORM SUBMIT
    function prosesSimpanTierList() {
        let hasilSusunan = {};
        const barisTierList = document.querySelectorAll('.tier-row');

        barisTierList.forEach(row => {
            const namaTier = row.getAttribute('data-tier');
            const heroKarakter = row.querySelectorAll('.hero-item');
            let listNamaHero = [];

            heroKarakter.forEach(hero => {
                listNamaHero.push(hero.getAttribute('data-nama'));
            });

            if(listNamaHero.length > 0){
                hasilSusunan[namaTier] = listNamaHero;
            }
        });

        const jsonString = JSON.stringify(hasilSusunan);

        if (Object.keys(hasilSusunan).length === 0) {
            Swal.fire('Oops!', 'Susun minimal 1 hero ke dalam papan tier list sebelum disimpan!', 'warning');
            return;
        }

        document.getElementById('susunanHeroInput').value = jsonString;
        document.getElementById('formTierList').submit();
    }

    // FUNGSI LOAD DATA: MEMBONGKAR JSON DB DAN DISTRIBUSI ELEMENT HERO KE PAPAN
    function bukaDanAturPapan(btnElement) {
        const idTier = btnElement.getAttribute('data-id');
        const nama = btnElement.getAttribute('data-nama');
        const jenis = btnElement.getAttribute('data-jenis');
        const susunanStr = btnElement.getAttribute('data-susunan');

        if (!susunanStr) return;

        try {
            const susunan = JSON.parse(susunanStr);
            const poolUtama = document.getElementById('heroPoolZone');

            // Reset Papan (Kembalikan semua hero aktif ke pool utama)
            const semuaHeroAktif = document.querySelectorAll('.tier-row .hero-item');
            semuaHeroAktif.forEach(hero => {
                poolUtama.appendChild(hero);
            });

            // Sinkronkan Form Isian atas
            document.getElementById('idTierInput').value = idTier
            document.querySelector('input[name="namaTierList"]').value = nama || '';
            document.querySelector('select[name="jenisTier"]').value = jenis;

            // Pindahkan Element Hero Fisik ke Baris Tier S-F
            Object.keys(susunan).forEach(keyTier => {
                const barisTarget = document.querySelector(`.tier-row[data-tier="${keyTier}"]`);
                if (barisTarget) {
                    const listNamaHeroInTier = susunan[keyTier];

                    listNamaHeroInTier.forEach(namaHero => {
                        const elementHero = document.querySelector(`.hero-item[data-nama="${namaHero}"]`);
                        if (elementHero) {
                            barisTarget.appendChild(elementHero);
                        }
                    });
                }
            });

            modal_load.close();

            Swal.fire({
                title: 'Data Berhasil Dimuat!',
                text: `Tier List "${nama || 'Tanpa Nama'}" telah ditampilkan.`,
                icon: 'success',
                background: '#111827',
                color: '#f3f4f6',
                confirmButtonColor: '#eab308'
            });

            window.scrollTo({ top: 0, behavior: 'smooth' });

        } catch (e) {
            console.error(e);
            Swal.fire('Error!', 'Data JSON susunan hero korup atau tidak valid.', 'error');
        }
    }

    // FUNGSI REFRESH CANVAS (MEMBERSIHKAN PAPAN DAN MODUL MENJADI NEW INSERT DATA)
    function resetCanvas() {
        const poolUtama = document.getElementById('heroPoolZone');
        const semuaHeroAktif = document.querySelectorAll('.tier-row .hero-item');

        semuaHeroAktif.forEach(hero => {
            poolUtama.appendChild(hero);
        });

        document.getElementById('idTierInput').value = '';
        document.querySelector('input[name="namaTierList"]').value = '';
        document.querySelector('select[name="jenisTier"]').value = 'serius';

        Swal.fire({
            title: 'Daftar Tier List Direset!',
            text: 'Daftar sudah dibersihkan.',
            icon: 'info',
            background: '#111827',
            color: '#f3f4f6',
            confirmButtonColor: '#3b82f6'
        });
    }

    // FUNGSI OTOMATIS: MENGUBAH JSON MENJADI TEKS RINGKASAN INDAH SAAT DIALOD
    document.addEventListener("DOMContentLoaded", function() {
        const previews = document.querySelectorAll('.json-clean-preview');
        previews.forEach(p => {
            const rawJson = p.getAttribute('data-raw');
            if (rawJson) {
                try {
                    const obj = JSON.parse(rawJson);
                    let textSummary = [];
                    Object.keys(obj).forEach(tier => {
                        textSummary.push(`${tier}: ${obj[tier].join(', ')}`);
                    });
                    p.textContent = textSummary.join(' | ');
                } catch (e) {
                    p.textContent = "Format data susunan tidak terbaca.";
                }
            }
        });
    });

    // SWEETALERT HANDLING FROM CONTROLLER FLASH ATTRIBUTE
    const pesan = [[${pesan}]];
    const tipe = [[${tipe}]];
    if (pesan) {
        Swal.fire({
            title: tipe === 'success' ? 'Berhasil!' : 'Info',
            text: pesan,
            icon: tipe,
            background: '#111827',
            color: '#f3f4f6',
            confirmButtonColor: '#eab308'
        });
    }

    // FUNGSI KONFIRMASI SWEETALERT UNTUK HAPUS REFERENSI TIERLIST
    function konfirmasiHapusTierList(deleteUrl) {
        Swal.fire({
            target: document.getElementById('modal_load'),
            title: 'Hapus Tier List?',
            text: "Daftar pada Tier List ini akan dihapus secara permanen dari database!",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ef4444',
            cancelButtonColor: '#4b5563',
            confirmButtonText: 'Hapus',
            background: '#111827',
            color: '#f3f4f6'
        }).then((result) => {
            if (result.isConfirmed) {
                window.location.href = deleteUrl;
            }
        });
    }
</script>
</body>
</html>
